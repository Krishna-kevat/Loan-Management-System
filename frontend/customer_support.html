<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Support | Purwase</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-switcher.js"></script>
</head>
<body>

  <header>
    <h1>Purwase</h1>
    <nav>
      <ul>
        <li><a href="customer_dashboard.php">Dashboard</a></li>
        <li><a href="apply_loan.html">Apply Loan</a></li>
        <li><a href="my_loans.php">My Loans</a></li>
        <li><a href="customer_profile.php">Profile</a></li>
        <li><a href="customer_support.html">Support</a></li>
        <li><a href="../backend/logout/customer_logout.php" style="color: var(--accent);">Logout</a></li>
        <li>
          <button class="theme-toggle" aria-label="Toggle Theme">
            <span class="sun">☀️</span>
            <span class="moon">🌙</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <div class="container" style="max-width: 600px; margin-top: 4rem; margin-bottom: 4rem;">
    <div class="card">
      <h2 style="text-align: center; margin-bottom: 1.5rem;">Customer Support</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Have a question? Submit your query and our team will get back to you.</p>

      <form id="supportForm" method="POST" action="../backend/actions/customer_support.php">
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" name="subject" id="subject" placeholder="Subject of your query" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea name="message" id="message" placeholder="Describe your issue in detail..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Query</button>
      </form>
      
      <div id="backLink" style="margin-top: 2rem; text-align: center;">
        <a href="customer_dashboard.php" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">&larr; Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const supportForm = document.getElementById("supportForm");
      const container = document.querySelector(".container");

      if (!supportForm) return;

      supportForm.addEventListener("submit", function(e) {
        e.preventDefault(); // Stop page reload IMMEDIATELY
        e.stopPropagation();

        const btn = supportForm.querySelector("button");
        const originalText = btn.textContent;
        btn.textContent = "Sending Query...";
        btn.disabled = true;

        const formData = new FormData(supportForm);

        fetch(supportForm.action, {
          method: 'POST',
          body: formData
        })
        .then(response => {
           if (!response.ok) throw new Error("Network Error");
           return response.json();
        })
        .then(data => {
          if (data.status === 'success') {
            container.innerHTML = `
              <div class="card shadow-2xl animate-fade-in" style="text-align: center; padding: 4rem 2rem; border: 2px solid var(--secondary);">
                <div style="font-size: 5rem; margin-bottom: 2rem;">🎧</div>
                <h2 style="color: var(--secondary); font-size: 2.5rem; margin-bottom: 1rem;">Query Submitted!</h2>
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 3rem;">
                  Thank you for reaching out. Our support team has received your ticket and will respond to your email shortly.
                </p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                  <a href="customer_dashboard.php" class="btn btn-secondary" style="text-decoration: none; padding: 1rem 2rem;">Return to Dashboard</a>
                </div>
              </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } else {
            alert("❌ Error: " + data.message);
            btn.textContent = originalText;
            btn.disabled = false;
          }
        })
        .catch(err => {
          console.error(err);
          alert("❌ System Error. Check your connection or try again later.");
          btn.textContent = originalText;
          btn.disabled = false;
        });
      });
    });
  </script>



  <footer>
    <p>&copy; 2025 Purwase Company | Customer Support</p>
  </footer>

</body>
</html>
