<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Registration | Purwase</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-switcher.js"></script>
</head>
<body>

  <header style="justify-content: flex-end; padding: 1rem 2rem;">
    <button class="theme-toggle" aria-label="Toggle Theme">
      <span class="sun">☀️</span>
      <span class="moon">🌙</span>
    </button>
  </header>

  <div class="container" style="max-width: 700px; margin-top: 2rem; margin-bottom: 4rem;">
    <div class="card">
      <h2 style="text-align: center; margin-bottom: 2rem;">Customer Registration</h2>

      <form id="registrationForm" action="../backend/auth/customer_register.php" method="POST" novalidate>
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 0;">
          
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Full Name">
            <div class="error" id="fullnameError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Email Address">
            <div class="error" id="emailError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="password">Password (3-4 characters)</label>
            <input type="password" id="password" name="password" placeholder="••••">
            <div class="error" id="passwordError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" placeholder="Phone Number">
            <div class="error" id="phoneError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob">
            <div class="error" id="dobError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label>Gender</label>
            <div style="display: flex; gap: 1rem; padding: 0.75rem 0;">
              <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer;">
                <input type="radio" name="gender" value="Male" style="width: auto;"> Male
              </label>
              <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer;">
                <input type="radio" name="gender" value="Female" style="width: auto;"> Female
              </label>
              <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer;">
                <input type="radio" name="gender" value="Other" style="width: auto;"> Other
              </label>
            </div>
            <div class="error" id="genderError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group" style="grid-column: span 1;">
            <label for="aadhaar">Aadhaar Number</label>
            <input type="text" id="aadhaar" name="aadhaar" placeholder="12 Digit Aadhaar Number">
            <div class="error" id="aadhaarError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="pan">PAN Number</label>
            <input type="text" id="pan" name="pan" placeholder="PAN Card Number">
            <div class="error" id="panError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="income">Annual Income (INR)</label>
            <input type="number" id="income" name="income" placeholder="Annual Income (INR)">
            <div class="error" id="incomeError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="employment">Employment Type</label>
            <select id="employment" name="employment">
              <option value="">-- Select --</option>
              <option value="salaried">Salaried</option>
              <option value="self-employed">Self-Employed</option>
              <option value="student">Student</option>
              <option value="retired">Retired</option>
            </select>
            <div class="error" id="employmentError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

        </div>

        <div class="form-group">
          <label for="address">Residential Address</label>
          <textarea id="address" name="address" rows="3" placeholder="Enter your full address"></textarea>
          <div class="error" id="addressError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Now</button>
      </form>

      <div style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
        <p>Already have an account? <a href="customer_login.html" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Login here</a></p>
        <p style="margin-top: 1rem;"><a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Back to Home</a></p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const registrationForm = document.getElementById("registrationForm");
      const container = document.querySelector(".container");

      if (!registrationForm) return;

      registrationForm.addEventListener("submit", function (e) {
        e.preventDefault(); // Stop page reload IMMEDIATELY
        e.stopPropagation();
        
        // ... [Existing validation logic kept for security]
        let valid = true;

        const fullnameInput = document.getElementById("fullname");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const phoneInput = document.getElementById("phone");
        const dobInput = document.getElementById("dob");
        const addressInput = document.getElementById("address");
        const aadhaarInput = document.getElementById("aadhaar");
        const panInput = document.getElementById("pan");
        const incomeInput = document.getElementById("income");
        const employmentInput = document.getElementById("employment");

        document.querySelectorAll(".error").forEach(el => el.textContent = "");
        document.querySelectorAll("input, select, textarea").forEach(el => el.style.borderColor = "");

        const fullname = fullnameInput.value.trim();
        if (!/^[A-Za-z ]{3,}$/.test(fullname)) {
          document.getElementById("fullnameError").textContent = "Enter valid name (min 3 alphabets)";
          fullnameInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(emailInput.value.trim())) {
          document.getElementById("emailError").textContent = "Enter valid email";
          emailInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        if (passwordInput.value.length < 3 || passwordInput.value.length > 4) {
          document.getElementById("passwordError").textContent = "Password must be 3-4 characters";
          passwordInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        if (!/^\d{10}$/.test(phoneInput.value.trim())) {
          document.getElementById("phoneError").textContent = "Phone must be 10 digits";
          phoneInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        const dobValue = dobInput.value;
        if (!dobValue) {
          document.getElementById("dobError").textContent = "DOB required";
          dobInput.style.borderColor = "var(--accent)";
          valid = false;
        } else {
          const age = new Date().getFullYear() - new Date(dobValue).getFullYear();
          if (age < 18) {
            document.getElementById("dobError").textContent = "Age must be 18+";
            dobInput.style.borderColor = "var(--accent)";
            valid = false;
          }
        }

        if (!document.querySelector('input[name="gender"]:checked')) {
          document.getElementById("genderError").textContent = "Select gender";
          valid = false;
        }

        if (addressInput.value.trim().length < 10) {
          document.getElementById("addressError").textContent = "Min 10 characters required";
          addressInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        if (!/^\d{12}$/.test(aadhaarInput.value.trim())) {
          document.getElementById("aadhaarError").textContent = "Aadhaar must be 12 digits";
          aadhaarInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        const panPattern = /^[A-Z]{5}[0-9]{4}[A-Z]$/;
        if (!panPattern.test(panInput.value.trim())) {
          document.getElementById("panError").textContent = "Example: ABCDE1234F";
          panInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        if (!/^\d{4,}$/.test(incomeInput.value.trim())) {
          document.getElementById("incomeError").textContent = "Minimum 4 digit income";
          incomeInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        if (!employmentInput.value) {
          document.getElementById("employmentError").textContent = "Select employment type";
          employmentInput.style.borderColor = "var(--accent)";
          valid = false;
        }

        if (!valid) {
          const firstError = document.querySelector(".error:not(:empty)");
          if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }

        // --- AJAX SUBMISSION ---
        const submitBtn = registrationForm.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;
        submitBtn.textContent = "Creating Account...";
        submitBtn.disabled = true;

        const formData = new FormData(registrationForm);

        fetch(registrationForm.action, {
          method: 'POST',
          body: formData
        })
        .then(response => {
           if (!response.ok) throw new Error("Server Error");
           return response.json();
        })
        .then(data => {
          if (data.status === 'success') {
            container.innerHTML = `
              <div class="card shadow-2xl animate-fade-in" style="text-align: center; padding: 4rem 2rem; border: 2px solid var(--primary);">
                <div style="font-size: 5rem; margin-bottom: 2rem;">🎉</div>
                <h2 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 1rem;">Registration Successful!</h2>
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 3rem; max-width: 500px; margin-left: auto; margin-right: auto;">
                  Welcome to Purwase! Your account has been created successfully. You can now access your personal financial dashboard.
                </p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                  <a href="customer_login.html" class="btn btn-primary" style="text-decoration: none; padding: 1rem 2rem;">Log In Now</a>
                </div>
              </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } else {
            alert("❌ Registration Error: " + data.message);
            submitBtn.textContent = originalBtnText;
            submitBtn.disabled = false;
          }
        })
        .catch(error => {
          console.error('Error:', error);
          alert("❌ System Error. Check your connection or try again later.");
          submitBtn.textContent = originalBtnText;
          submitBtn.disabled = false;
        });
      });
    });
  </script>

  </script>

</body>
</html>
