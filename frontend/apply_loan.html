<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Purwase Loan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fa;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 60%;
      margin: 40px auto;
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #34495e;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
      color: #333;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-bottom: 8px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #34495e;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2c3e50;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Purwase Loan Application Form</h2>
    <form id="loanForm" action="../backend/actions/apply_loan.php" method="POST" enctype="multipart/form-data">

      <label for="loan_type">Loan Type</label>
      <select id="loan_type" name="loan_type">
        <option value="">-- Select Loan Type --</option>
        <option value="Personal Loan">Personal Loan</option>
        <option value="Home Loan">Home Loan</option>
        <option value="Car Loan">Car Loan</option>
        <option value="Education Loan">Education Loan</option>
        <option value="Business Loan">Business Loan</option>
      </select>
      <div class="error" id="loanTypeError"></div>

      <label for="amount">Loan Amount (INR)</label>
      <input type="number" id="amount" name="amount">
      <div class="error" id="amountError"></div>

      <label for="tenure">Tenure (in months)</label>
      <input type="number" id="tenure" name="tenure">
      <div class="error" id="tenureError"></div>

      <label for="purpose">Purpose of Loan</label>
      <textarea id="purpose" name="purpose" rows="3"></textarea>
      <div class="error" id="purposeError"></div>

      <label for="income">Annual Income (INR)</label>
      <input type="number" id="income" name="income">
      <div class="error" id="incomeError"></div>

      <h3>Upload Required Documents (JPG/PNG/PDF)</h3>

      <label>Aadhar Card</label>
      <input type="file" name="documents[aadhar]" accept=".pdf,.jpg,.jpeg,.png">
      <div class="error" id="aadharError"></div>

      <label>PAN Card</label>
      <input type="file" name="documents[pan]" accept=".pdf,.jpg,.jpeg,.png">
      <div class="error" id="panError"></div>

      <label>Salary Slip</label>
      <input type="file" name="documents[salaryslip]" accept=".pdf,.jpg,.jpeg,.png">
      <div class="error" id="salaryError"></div>

      <label>Bank Statement</label>
      <input type="file" name="documents[bankstatement]" accept=".pdf,.jpg,.jpeg,.png">
      <div class="error" id="bankError"></div>

      <label>Address Proof</label>
      <input type="file" name="documents[addressproof]" accept=".pdf,.jpg,.jpeg,.png">
      <div class="error" id="addressProofError"></div>

      <button type="submit">Submit Loan Application</button>
    </form>
  </div>

  <script>
    const loanForm = document.getElementById("loanForm");

    loanForm.addEventListener("submit", function (e) {
      let valid = true;

      // Clear previous errors
      document.querySelectorAll(".error").forEach(el => el.textContent = "");

      // Loan Type
      if (!document.getElementById("loan_type").value) {
        document.getElementById("loanTypeError").textContent = "Please select a loan type.";
        valid = false;
      }

      // Amount
      const amount = document.getElementById("amount").value.trim();
      if (!/^\d+$/.test(amount) || Number(amount) < 10000) {
        document.getElementById("amountError").textContent = "Amount must be number & ≥ 10000.";
        valid = false;
      }

      // Tenure
      const tenure = document.getElementById("tenure").value.trim();
      if (!/^\d+$/.test(tenure) || Number(tenure) < 1 || Number(tenure) > 12) {
        document.getElementById("tenureError").textContent = "Tenure must be between 1 to 12 months.";
        valid = false;
      }

      // Purpose
      const purpose = document.getElementById("purpose").value.trim();
      if (purpose.length < 10) {
        document.getElementById("purposeError").textContent = "Purpose must be at least 10 characters.";
        valid = false;
      }

      // Income
      const income = document.getElementById("income").value.trim();
      if (!/^\d{4,}$/.test(income)) {
        document.getElementById("incomeError").textContent = "Income must be number & min 4 digits.";
        valid = false;
      }

      // Documents validation
      if (!loanForm['documents[aadhar]'].files.length) {
        document.getElementById("aadharError").textContent = "Aadhar required.";
        valid = false;
      }
      if (!loanForm['documents[pan]'].files.length) {
        document.getElementById("panError").textContent = "PAN required.";
        valid = false;
      }
      if (!loanForm['documents[salaryslip]'].files.length) {
        document.getElementById("salaryError").textContent = "Salary Slip required.";
        valid = false;
      }
      if (!loanForm['documents[bankstatement]'].files.length) {
        document.getElementById("bankError").textContent = "Bank Statement required.";
        valid = false;
      }
      if (!loanForm['documents[addressproof]'].files.length) {
        document.getElementById("addressProofError").textContent = "Address Proof required.";
        valid = false;
      }
      if (!valid) e.preventDefault();
    });
  </script>

</body>

</html>
