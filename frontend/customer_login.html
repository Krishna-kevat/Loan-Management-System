<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login | Purwase</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-switcher.js"></script>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

  <header style="justify-content: flex-end; padding: 1rem 2rem;">
    <button class="theme-toggle" aria-label="Toggle Theme">
      <span class="sun">☀️</span>
      <span class="moon">🌙</span>
    </button>
  </header>

  <main style="flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem;">

  <div class="card" style="width: 100%; max-width: 400px;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Customer Login</h2>
    
    <form id="loginForm" action="../backend/auth/customer_login.php" method="POST" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <small id="emailError" style="color: var(--accent); font-size: 0.8rem; display:block; margin-top: 0.5rem;"></small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>

    <div style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
      <p>Don't have an account? <a href="customer_register.html" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Register here</a></p>
      <p style="margin-top: 1rem;"><a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Back to Home</a></p>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (event) {
      const emailField = document.getElementById("email");
      const email = emailField.value.trim();
      const errorMsg = document.getElementById("emailError");
      const regex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;

      if (!regex.test(email)) {
        errorMsg.textContent = "⚠ Enter a valid email address!";
        emailField.style.borderColor = "var(--accent)";
        event.preventDefault();
      } else {
        errorMsg.textContent = "";
        emailField.style.borderColor = "";
      }
    });
  </script>

  </main>
</body>
</html>
