<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | Purwase</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-switcher.js"></script>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

  <header style="justify-content: flex-end; padding: 1rem 2rem;">
    <button class="theme-toggle" aria-label="Toggle Theme">
      <span class="sun">☀️</span>
      <span class="moon">🌙</span>
    </button>
  </header>

  <main style="flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem;">

  <div class="card" style="width: 100%; max-width: 400px;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Staff Login</h2>

    <form id="staffLoginForm" method="POST" action="../backend/auth/staff_login.php" novalidate>
      <div class="form-group">
        <label for="email">Staff Email</label>
        <input type="email" id="email" name="email" placeholder="staff@purwase.com" required>
        <small id="emailError" style="color: var(--accent); font-size: 0.8rem; display:block; margin-top: 0.5rem;"></small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <small id="passwordError" style="color: var(--accent); font-size: 0.8rem; display:block; margin-top: 0.5rem;"></small>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login to Dashboard</button>
    </form>

    <div style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
      <p>Need access? <a href="staff_register.html" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Register here</a></p>
      <p style="margin-top: 1rem;"><a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Back to Home</a></p>
    </div>
  </div>

  <script>
    document.getElementById("staffLoginForm").addEventListener("submit", function (event) {
      event.preventDefault();

      let isValid = true;
      const emailField = document.getElementById("email");
      const passwordField = document.getElementById("password");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");

      const email = emailField.value.trim();
      const password = passwordField.value.trim();

      const regex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;

      if (!regex.test(email)) {
        emailError.textContent = "⚠ Enter a valid email address!";
        emailField.style.borderColor = "var(--accent)";
        isValid = false;
      } else {
        emailError.textContent = "";
        emailField.style.borderColor = "";
      }

      if (password === "") {
        passwordError.textContent = "⚠ Password is required!";
        passwordField.style.borderColor = "var(--accent)";
        isValid = false;
      } else {
        passwordError.textContent = "";
        passwordField.style.borderColor = "";
      }

      if (isValid) {
        this.submit();
      }
    });
  </script>

  </main>
</body>
</html>
