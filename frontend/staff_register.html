<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Registration | Purwase</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-switcher.js"></script>
</head>
<body>

  <header style="justify-content: flex-end; padding: 1rem 2rem;">
    <button class="theme-toggle" aria-label="Toggle Theme">
      <span class="sun">☀️</span>
      <span class="moon">🌙</span>
    </button>
  </header>

  <div class="container" style="max-width: 800px; margin-top: 2rem; margin-bottom: 4rem;">
    <div class="card">
      <h2 style="text-align: center; margin-bottom: 2rem;">Staff Registration</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 3rem;">Create a new staff account to access the management dashboard.</p>

      <form id="staffForm" action="../backend/auth/staff_register.php" method="POST" novalidate>
        
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 0;">
          
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="John Doe">
            <div class="error" id="fullnameError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="staff@purwase.com">
            <div class="error" id="emailError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="password">Password (3-4 characters)</label>
            <input type="password" id="password" name="password" placeholder="••••">
            <div class="error" id="passwordError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="1234567890">
            <div class="error" id="phoneError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob">
            <div class="error" id="dobError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label>Gender</label>
            <div style="display: flex; gap: 1rem; padding: 0.75rem 0;">
              <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer;">
                <input type="radio" name="gender" value="Male" style="width: auto;"> Male
              </label>
              <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer;">
                <input type="radio" name="gender" value="Female" style="width: auto;"> Female
              </label>
              <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer;">
                <input type="radio" name="gender" value="Other" style="width: auto;"> Other
              </label>
            </div>
            <div class="error" id="genderError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="staff_id">Staff ID</label>
            <input type="text" id="staff_id" name="staff_id" placeholder="EMP123">
            <div class="error" id="staffIdError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="role">Role / Designation</label>
            <select id="role" name="role">
              <option value="">-- Select Role --</option>
              <option value="Loan Officer">Loan Officer</option>
              <option value="Manager">Manager</option>
              <option value="Clerk">Clerk</option>
            </select>
            <div class="error" id="roleError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="salary">Monthly Salary (INR)</label>
            <input type="number" id="salary" name="salary" placeholder="50000">
            <div class="error" id="salaryError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

          <div class="form-group">
            <label for="joining_date">Joining Date</label>
            <input type="date" id="joining_date" name="joining_date">
            <div class="error" id="joiningDateError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
          </div>

        </div>

        <div class="form-group">
          <label for="address">Residential Address</label>
          <textarea id="address" name="address" rows="3" placeholder="Enter your full residential address"></textarea>
          <div class="error" id="addressError" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Staff Member</button>
      </form>

      <div style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
        <p>Already have a staff account? <a href="staff_login.html" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Login here</a></p>
        <p style="margin-top: 1rem;"><a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Back to Home</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('staffForm').addEventListener('submit', function (e) {
      let valid = true;

      // Clear all errors
      document.querySelectorAll('.error').forEach(el => el.textContent = '');
      document.querySelectorAll('input, select, textarea').forEach(el => el.style.borderColor = '');

      const fullnameInput = document.getElementById('fullname');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const phoneInput = document.getElementById('phone');
      const dobInput = document.getElementById('dob');
      const addressInput = document.getElementById('address');
      const staffIdInput = document.getElementById('staff_id');
      const roleInput = document.getElementById('role');
      const salaryInput = document.getElementById('salary');
      const joiningDateInput = document.getElementById('joining_date');

      // Full Name validation
      if (!/^[A-Za-z ]+$/.test(fullnameInput.value.trim())) {
        document.getElementById('fullnameError').textContent = "Full name must contain only alphabets.";
        fullnameInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Email validation
      const emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;
      if (!emailPattern.test(emailInput.value.trim())) {
        document.getElementById('emailError').textContent = "Please enter a valid email address.";
        emailInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Password validation
      if (passwordInput.value.length < 3 || passwordInput.value.length > 4) {
        document.getElementById('passwordError').textContent = "Password must be 3 to 4 characters long.";
        passwordInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Phone validation
      if (!/^\d{10}$/.test(phoneInput.value.trim())) {
        document.getElementById('phoneError').textContent = "Phone number must be 10 digits.";
        phoneInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // DOB validation
      const dobDate = new Date(dobInput.value);
      const today = new Date();
      if (!dobInput.value) {
        document.getElementById('dobError').textContent = "Date of birth is required.";
        dobInput.style.borderColor = "var(--accent)";
        valid = false;
      } else if (dobDate >= today) {
        document.getElementById('dobError').textContent = "DOB must be in the past.";
        dobInput.style.borderColor = "var(--accent)";
        valid = false;
      } else if (today.getFullYear() - dobDate.getFullYear() < 18) {
        document.getElementById('dobError').textContent = "You must be at least 18 years old.";
        dobInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Gender validation
      if (!document.querySelector('input[name="gender"]:checked')) {
        document.getElementById('genderError').textContent = "Please select a gender.";
        valid = false;
      }

      // Address validation
      if (addressInput.value.trim().length < 10) {
        document.getElementById('addressError').textContent = "Address must be at least 10 characters.";
        addressInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Staff ID validation
      if (!/^[A-Za-z0-9]{3,20}$/.test(staffIdInput.value.trim())) {
        document.getElementById('staffIdError').textContent = "Staff ID must be minimum 3 alphanumeric characters.";
        staffIdInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Role validation
      if (!roleInput.value) {
        document.getElementById('roleError').textContent = "Please select a role.";
        roleInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Salary validation
      if (!/^\d{4,}$/.test(salaryInput.value.trim())) {
        document.getElementById('salaryError').textContent = "Salary must be numeric & minimum 4 digits.";
        salaryInput.style.borderColor = "var(--accent)";
        valid = false;
      }

      // Joining Date validation
      if (!joiningDateInput.value) {
        document.getElementById('joiningDateError').textContent = "Joining date is required.";
        joiningDateInput.style.borderColor = "var(--accent)";
        valid = false;
      } else {
        const joinDate = new Date(joiningDateInput.value);
        if (joinDate >= today) {
          document.getElementById('joiningDateError').textContent = "Joining date must be in the past.";
          joiningDateInput.style.borderColor = "var(--accent)";
          valid = false;
        }
      }

      if (!valid) {
        e.preventDefault();
        const firstError = document.querySelector(".error:not(:empty)");
        if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  </script>

</body>
</html>
