<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purwase Customer Support</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fa;
      margin: 0;
      padding: 0;
    }

    header {
      background: #2c3e50;
      padding: 15px;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #2980b9;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input,
    textarea,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: vertical;
      height: 120px;
    }

    button {
      background: #2980b9;
      color: white;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1c5d8a;
    }
  </style>
</head>

<body>
  <header>
    <h1>Purwase Customer Support</h1>
  </header>

  <div class="container">
    <h2>Submit Your Query</h2>

    <form method="POST" action="customer_support.php">
      <label for="subject">Subject:</label>
      <input type="text" name="subject" id="subject" required>

      <label for="message">Message:</label>
      <textarea name="message" id="message" required></textarea>

      <button type="submit">Submit Query</button>
    </form>
  </div>
</body>

</html>
