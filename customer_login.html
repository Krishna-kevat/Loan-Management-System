<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login - Purwase Loan Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.2);
      width: 350px;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #2c3e50;
      text-align: center;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1c5d8a;
    }

    .link {
      margin-top: 15px;
      text-align: center;
    }

    .link a {
      text-decoration: none;
      color: #2980b9;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>Purwase Customer Login</h2>
    <form id="loginForm" action="customer_login.php" method="POST" novalidate>
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>
      <small id="emailError" style="color: red; font-size: 13px; display:block;"></small>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Login</button>
    </form>

    <script>
      document.getElementById("loginForm").addEventListener("submit", function (event) {
        const emailField = document.getElementById("email");
        const email = emailField.value.trim();
        const errorMsg = document.getElementById("emailError");

        const regex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;

        if (!regex.test(email)) {
          errorMsg.textContent = "⚠ Enter a valid email address!";
          emailField.style.border = "2px solid red";
          event.preventDefault();
        } else {
          errorMsg.textContent = "";
          emailField.style.border = "";
        }
      });
    </script>

    <div class="link">
      <p>Don't have an account? <a href="customer_register.html">Register here</a></p>
    </div>
  </div>
</body>

</html>
