<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purwase Staff Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fa;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: #fff;
      padding: 30px 25px;
      border-radius: 10px;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      width: 350px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2980b9;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #1c5d8a;
    }

    .error {
      color: red;
      margin-bottom: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h2>Purwase Staff Login</h2>



    <form id="staffLoginForm" method="POST" action="staff_login.php" novalidate>
      <label>Email:</label>
      <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
      <small id="emailError" style="color: red; font-size: 13px; display:block;"></small>

      <label>Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
      <small id="passwordError" style="color: red; font-size: 13px; display:block;"></small>

      <button type="submit">Login</button>
    </form>

    <script>
      document.getElementById("staffLoginForm").addEventListener("submit", function (event) {

        event.preventDefault(); // ❌ Stop default browser validation

        let isValid = true;

        const emailField = document.getElementById("email");
        const passwordField = document.getElementById("password");
        const emailError = document.getElementById("emailError");
        const passwordError = document.getElementById("passwordError");

        const email = emailField.value.trim();
        const password = passwordField.value.trim();

        emailField.setCustomValidity(""); // Clear default messages
        passwordField.setCustomValidity("");

        const regex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;

        // Email Validation
        if (!regex.test(email)) {
          emailError.textContent = "⚠ Enter a valid email address!";
          emailField.style.border = "2px solid red";
          isValid = false;
        } else {
          emailError.textContent = "";
          emailField.style.border = "";
        }

        // Password Required Validation
        if (password === "") {
          passwordError.textContent = "⚠ Password is required!";
          passwordField.style.border = "2px solid red";
          isValid = false;
        } else {
          passwordError.textContent = "";
          passwordField.style.border = "";
        }

        if (isValid) {
          this.submit(); // ✔ Submit manually only after validation passes
        }
      });
    </script>



  </div>
</body>

</html>
